name: Auto Submit Form

on:
  schedule:
    - cron: '0 10 * * *'  # 17:00 WIB (UTC+7 = 10:00 UTC)
  workflow_dispatch:      # bisa run manual juga

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python submit_form_makanan.py
