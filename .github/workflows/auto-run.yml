name: Auto Submit Form

on:
  schedule:
    - cron: '50 16 * * 1-5'   # 16:30
    - cron: '10 17 * * 1-5'   # 17:20
    - cron: '20 17 * * 1-5'   # 17:40
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          TZ: 'Asia/Jakarta'
        run: python submit_form_makanan.py
